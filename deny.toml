# cargo-deny configuration (v2 schema)
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
ignore = [
    # rsa crate Marvin Attack — transitive via russh; no fix available yet in russh dependency tree
    "RUSTSEC-2023-0071",
    # rustls-pemfile unmaintained — workspace dep for TLS feature; will migrate when rustls ecosystem settles
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "GPL-3.0",
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"  # workspace deps use inherited versions
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
allow-org = { github = ["clawosiris"] }
