name: gvm-rools
arch: ${NFPM_ARCH}
platform: linux
version: ${VERSION}
release: ${RELEASE_NUMBER}
section: utils
priority: optional
maintainer: clawosiris <clawosiris@users.noreply.github.com>
description: |
  Rust reimplementation of Greenbone's gvm-tools gvm-cli built on top of rust-gvm.
vendor: clawosiris
homepage: https://github.com/clawosiris/gvm-rools
license: AGPL-3.0-or-later

contents:
  - src: ./dist/pkgroot/usr/bin/gvm-cli
    dst: /usr/bin/gvm-cli
    file_info:
      mode: 0755
  - src: ./README.md
    dst: /usr/share/doc/gvm-rools/README.md
    file_info:
      mode: 0644
  - src: ./LICENSE
    dst: /usr/share/licenses/gvm-rools/LICENSE
    file_info:
      mode: 0644

rpm:
  summary: Rust gvm-cli for Greenbone GMP endpoints

archlinux:
  pkgbase: gvm-rools
  packager: clawosiris <clawosiris@users.noreply.github.com>
