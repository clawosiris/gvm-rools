name: Backfill Release Assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-upload:
    name: "Backfill v${{ inputs.version }} assets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        run: |
          TAG="v${{ inputs.version }}"
          if [[ ! "${TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be semver-shaped: ${TAG}" >&2
            exit 1
          fi

      - name: Normalize rust-gvm refs for tagged rebuilds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_TAG="$(gh api repos/clawosiris/rust-gvm/tags --jq '[.[].name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first')"
          if [[ -z "${UPSTREAM_TAG}" || "${UPSTREAM_TAG}" == "null" ]]; then
            echo "No stable rust-gvm tag found" >&2
            exit 1
          fi
          echo "Pinning rust-gvm dependencies to ${UPSTREAM_TAG}"
          sed -i "s|tag = \"v[^\"]*\"|tag = \"${UPSTREAM_TAG}\"|g" Cargo.toml crates/gvm-rools-cli/Cargo.toml
          sed -i "s|branch = \"main\"|tag = \"${UPSTREAM_TAG}\"|g" Cargo.toml crates/gvm-rools-cli/Cargo.toml
          cargo generate-lockfile

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: stable

      - name: Install release packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release assets
        env:
          VERSION: ${{ inputs.version }}
          TARGET: x86_64-unknown-linux-musl
          NFPM_ARCH: amd64
          RELEASE_NUMBER: "1"
        run: |
          chmod +x scripts/build-release-artifacts.sh
          scripts/build-release-artifacts.sh "${VERSION}"
          cp "target/${TARGET}/release/gvm-cli" "dist/gvm-cli-v${VERSION}-${TARGET}"
          (
            cd dist
            sha256sum "gvm-cli-v${VERSION}-${TARGET}" >> SHA256SUMS
          )

      - name: Upload assets to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TARGET="x86_64-unknown-linux-musl"
          gh release upload "v${VERSION}" \
            "dist/gvm-rools-v${VERSION}-${TARGET}.tar.gz" \
            "dist/gvm-cli-v${VERSION}-${TARGET}" \
            "dist/gvm-rools_${VERSION}_amd64.deb" \
            "dist/gvm-rools-${VERSION}-1.x86_64.rpm" \
            "dist/gvm-rools-${VERSION}-1-x86_64.pkg.tar.zst" \
            "dist/SHA256SUMS" \
            --clobber
