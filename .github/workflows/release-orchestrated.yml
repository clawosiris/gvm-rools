# Orchestrated Release — triggered by clawosiris/release-orchestrator
# Do NOT trigger manually — use the orchestrator instead.

name: Orchestrated Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without 'v' prefix)"
        required: true
        type: string
      release-type:
        description: "Release type (alpha, beta, release-candidate, patch, minor, major)"
        required: false
        type: string
        default: "patch"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Pin deps + version bump + tag + GH Release
  # ──────────────────────────────────────────────
  prepare:
    name: "Prepare v${{ inputs.version }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      # Pin rust-gvm dependency on stable releases
      - name: Pin upstream dependencies
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != *"-"* ]]; then
            sed -i "s|branch = \"main\"|tag = \"v$VERSION\"|g" Cargo.toml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml
            git commit -m "build(deps): pin rust-gvm to v$VERSION" || true
            git push
          else
            echo "Pre-release: keeping branch = main"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Create release
        uses: greenbone/actions/release@v3
        with:
          github-user: ${{ vars.RELEASE_USER || 'clawosiris' }}
          github-user-mail: ${{ vars.RELEASE_USER_MAIL || 'clawosiris@users.noreply.github.com' }}
          github-user-token: ${{ secrets.RELEASE_TOKEN }}
          release-type: ${{ inputs.release-type }}
          release-version: ${{ inputs.version }}
          versioning-scheme: semver
          project-types: cargo
          next-version: "false"

      - name: Regenerate Cargo.lock
        run: |
          cargo generate-lockfile
          if ! git diff --quiet Cargo.lock 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit --amend --no-edit
            git push --force-with-lease
            TAG="v${{ inputs.version }}"
            git tag -f "$TAG"
            git push origin "$TAG" --force
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  # ──────────────────────────────────────────────
  # Step 2: Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo test --workspace --all-features

  # ──────────────────────────────────────────────
  # Step 3: Generate SBOM
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate CycloneDX SBOM (JSON)
        run: cargo cyclonedx --format json --all --spec-version 1.5
      - name: Generate CycloneDX SBOM (XML)
        run: cargo cyclonedx --format xml --all --spec-version 1.5
      - name: Collect SBOMs
        shell: bash
        run: |
          mkdir -p sbom-artifacts
          find . -name '*.cdx.json' -not -path '*/target/*' -not -path '*/fixtures/*' -not -path '*/sbom-artifacts/*' -exec cp {} sbom-artifacts/ \;
          find . -name '*.cdx.xml' -not -path '*/target/*' -not -path '*/fixtures/*' -not -path '*/sbom-artifacts/*' -exec cp {} sbom-artifacts/ \;
          ls -la sbom-artifacts/
      - name: Post-process CycloneDX JSON SBOMs
        shell: bash
        run: |
          python3 scripts/sbom_postprocess.py --cargo-toml Cargo.toml sbom-artifacts/*.cdx.json
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: stable
      - name: Install sbomqs
        run: |
          go install github.com/interlynk-io/sbomqs@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Score post-processed SBOMs
        shell: bash
        run: |
          sbomqs score --json sbom-artifacts/*.cdx.json > sbomqs-results.json
          python3 - sbomqs-results.json <<'PY'
          import json
          import sys

          threshold = 7.0
          with open(sys.argv[1], "r", encoding="utf-8") as handle:
              data = json.load(handle)

          failures = []
          for entry in data.get("files", []):
              score = float(entry.get("avg_score", 0.0))
              path = entry.get("path") or entry.get("file") or entry.get("fileName") or "<unknown>"
              print(f"{path}: {score:.2f}/10")
              if score < threshold:
                  failures.append((path, score))

          if failures:
              for path, score in failures:
                  print(f"::error file={path}::SBOM quality score below {threshold:.1f}: {score:.2f}")
              raise SystemExit(1)
          PY
      - name: Package SBOMs
        run: |
          cd sbom-artifacts
          tar czf ../gvm-rools-sbom.tar.gz *.cdx.*
          cd ..
          sha256sum gvm-rools-sbom.tar.gz > gvm-rools-sbom.tar.gz.sha256
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom
          path: |
            gvm-rools-sbom.tar.gz
            gvm-rools-sbom.tar.gz.sha256
            sbomqs-results.json

  # ──────────────────────────────────────────────
  # Step 4: Upload artifacts to GH Release
  # ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ inputs.version }}" artifacts/*.tar.gz artifacts/*.sha256 --clobber
