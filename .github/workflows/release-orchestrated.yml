# Orchestrated Release — triggered by clawosiris/release-orchestrator
# Do NOT trigger manually — use the orchestrator instead.

name: Orchestrated Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without 'v' prefix)"
        required: true
        type: string
      release-type:
        description: "Release type (alpha, beta, release-candidate, patch, minor, major)"
        required: false
        type: string
        default: "patch"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: "Release v${{ inputs.version }}"
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.release.outputs.release-version }}
      git-release-tag: ${{ steps.release.outputs.git-release-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      # Pin rust-gvm dependency to release tag (stable releases only)
      - name: Pin upstream dependencies
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != *"-"* ]]; then
            sed -i "s|branch = \"main\"|tag = \"v$VERSION\"|g" Cargo.toml
            echo "Pinned rust-gvm deps to tag v$VERSION"
            git add Cargo.toml
            git commit -m "build(deps): pin rust-gvm to v$VERSION" || true
          else
            echo "Pre-release: keeping branch = main"
          fi
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"

      - name: Create release
        id: release
        uses: greenbone/actions/release@v3
        with:
          github-user: ${{ vars.RELEASE_USER || 'clawosiris' }}
          github-user-mail: ${{ vars.RELEASE_USER_MAIL || 'clawosiris@users.noreply.github.com' }}
          github-user-token: ${{ secrets.RELEASE_TOKEN }}
          release-version: ${{ inputs.version }}
          release-type: ${{ inputs.release-type }}
          versioning-scheme: semver
          project-types: cargo
          git-tag-prefix: v
          github-pre-release: ${{ contains(inputs.version, '-') && 'true' || 'false' }}
          sign-release-files: "false"
          next-version: "false"
          update-project: "true"

      - name: Regenerate Cargo.lock
        run: |
          cargo generate-lockfile
          if ! git diff --quiet Cargo.lock; then
            git add Cargo.lock
            git commit --amend --no-edit
            git push --force-with-lease
            TAG="v${{ steps.release.outputs.release-version || inputs.version }}"
            git tag -f "$TAG"
            git push origin "$TAG" --force
          fi

      - name: Wait for release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.release.outputs.release-version || inputs.version }}"
          echo "Tag $TAG created. Waiting for release.yml to trigger..."
          sleep 15

          for i in $(seq 1 60); do
            RUN_ID=$(gh run list --workflow=release.yml --limit=10 --json databaseId,headBranch --jq ".[] | select(.headBranch==\"$TAG\") | .databaseId" 2>/dev/null | head -1 || true)
            if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
              echo "Found release workflow run: $RUN_ID"
              gh run watch "$RUN_ID" --exit-status || exit 1
              echo "✅ Release workflow completed successfully"
              exit 0
            fi
            echo "Waiting for release workflow to appear... ($i/60)"
            sleep 15
          done

          echo "::error::Release workflow did not trigger within timeout"
          exit 1
