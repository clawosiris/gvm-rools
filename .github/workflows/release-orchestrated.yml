name: Orchestrated Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without 'v' prefix)"
        required: true
        type: string
      release-type:
        description: "Release type (alpha, beta, release-candidate, patch, minor, major)"
        required: false
        type: string
        default: "patch"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: "Prepare v${{ inputs.version }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Relax main branch protection for release pushes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection > "$RUNNER_TEMP/main-protection-raw.json"
          jq '{
            required_status_checks: (.required_status_checks | if . == null then null else {strict, checks} end),
            enforce_admins: .enforce_admins.enabled,
            required_pull_request_reviews: (.required_pull_request_reviews | if . == null then null else {
              dismiss_stale_reviews,
              require_code_owner_reviews,
              require_last_push_approval,
              required_approving_review_count
            } end),
            restrictions: .restrictions,
            required_linear_history: .required_linear_history.enabled,
            allow_force_pushes: .allow_force_pushes.enabled,
            allow_deletions: .allow_deletions.enabled,
            block_creations: .block_creations.enabled,
            required_conversation_resolution: .required_conversation_resolution.enabled,
            lock_branch: .lock_branch.enabled,
            allow_fork_syncing: .allow_fork_syncing.enabled
          }' "$RUNNER_TEMP/main-protection-raw.json" > "$RUNNER_TEMP/main-protection.json"
          gh api --method DELETE repos/${{ github.repository }}/branches/main/protection/required_status_checks || true
          gh api --method DELETE repos/${{ github.repository }}/branches/main/protection/required_pull_request_reviews || true
      - name: Pin upstream dependencies
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != *"-"* ]]; then
            UPSTREAM_TAG="$(gh api repos/clawosiris/rust-gvm/tags --jq '[.[].name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first')"
            if [[ -z "${UPSTREAM_TAG}" || "${UPSTREAM_TAG}" == "null" ]]; then
              echo "No stable rust-gvm tag found" >&2
              exit 1
            fi
            echo "Pinning rust-gvm dependencies to ${UPSTREAM_TAG}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            sed -i "s|tag = \"v[^\"]*\"|tag = \"${UPSTREAM_TAG}\"|g" Cargo.toml crates/gvm-rools-cli/Cargo.toml
            sed -i "s|branch = \"main\"|tag = \"${UPSTREAM_TAG}\"|g" Cargo.toml crates/gvm-rools-cli/Cargo.toml
            git add Cargo.toml crates/gvm-rools-cli/Cargo.toml
            git commit -m "build(deps): pin rust-gvm to ${UPSTREAM_TAG}" || true
            git pull --rebase origin "${GITHUB_REF_NAME:-main}"
            git push
          else
            echo "Pre-release: keeping branch = main"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Create release
        uses: greenbone/actions/release@v3
        with:
          github-user: ${{ vars.RELEASE_USER || 'clawosiris' }}
          github-user-mail: ${{ vars.RELEASE_USER_MAIL || 'clawosiris@users.noreply.github.com' }}
          github-user-token: ${{ secrets.RELEASE_TOKEN }}
          release-type: ${{ inputs.release-type }}
          release-version: ${{ inputs.version }}
          versioning-scheme: semver
          project-types: cargo
          next-version: "false"
          admin-bypass: "false"
      - name: Regenerate Cargo.lock
        run: |
          cargo generate-lockfile
          if ! git diff --quiet Cargo.lock 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "build(release): refresh Cargo.lock for v${{ inputs.version }}"
            git push
            TAG="v${{ inputs.version }}"
            git tag -f "$TAG"
            git push origin "$TAG" --force
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Restore main branch protection
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H 'Accept: application/vnd.github+json' \
            repos/${{ github.repository }}/branches/main/protection \
            --input "$RUNNER_TEMP/main-protection.json"

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: v${{ inputs.version }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - run: cargo test --workspace --all-features

  sbom:
    name: Generate SBOM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: v${{ inputs.version }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate and upload SBOMs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo cyclonedx --format json --all --spec-version 1.5
          cargo cyclonedx --format xml --all --spec-version 1.5
          mkdir -p sbom-artifacts
          find . -name '*.cdx.json' -not -path '*/target/*' -not -path '*/sbom-artifacts/*' -exec cp {} sbom-artifacts/ \;
          find . -name '*.cdx.xml' -not -path '*/target/*' -not -path '*/sbom-artifacts/*' -exec cp {} sbom-artifacts/ \;
          python3 scripts/sbom_postprocess.py --cargo-toml Cargo.toml sbom-artifacts/*.cdx.json
          cd sbom-artifacts && tar czf ../gvm-rools-sbom.tar.gz *.cdx.* && cd ..
          sha256sum gvm-rools-sbom.tar.gz > gvm-rools-sbom.tar.gz.sha256
          gh release upload "v${{ inputs.version }}" gvm-rools-sbom.tar.gz gvm-rools-sbom.tar.gz.sha256 --clobber

  packages:
    name: Build release artifacts
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: v${{ inputs.version }}
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
      - name: Install release packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build packages
        env:
          VERSION: ${{ inputs.version }}
          TARGET: x86_64-unknown-linux-musl
          NFPM_ARCH: amd64
          RELEASE_NUMBER: "1"
        run: |
          chmod +x scripts/build-release-artifacts.sh
          scripts/build-release-artifacts.sh "${VERSION}"
      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          TARGET="x86_64-unknown-linux-musl"
          gh release upload "v${VERSION}" \
            "dist/gvm-cli-v${VERSION}-${TARGET}" \
            "dist/gvm-rools-v${VERSION}-${TARGET}.tar.gz" \
            "dist/gvm-rools_${VERSION}_amd64.deb" \
            "dist/gvm-rools-${VERSION}-1.x86_64.rpm" \
            "dist/gvm-rools-${VERSION}-1-x86_64.pkg.tar.zst" \
            "dist/SHA256SUMS" \
            --clobber

  collect:
    name: Release complete
    needs: [sbom, packages]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All release artifacts published for v${{ inputs.version }}"
