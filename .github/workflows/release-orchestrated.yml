name: Orchestrated Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without 'v' prefix)"
        required: true
        type: string
      release-type:
        description: "Release type (alpha, beta, release-candidate, patch, minor, major)"
        required: false
        type: string
        default: "patch"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: "Prepare v${{ inputs.version }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Pin upstream dependencies
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" != *"-"* ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            sed -i "s|branch = \"main\"|tag = \"v$VERSION\"|g" Cargo.toml
            git add Cargo.toml
            git commit -m "build(deps): pin rust-gvm to v$VERSION" || true
            git push
          else
            echo "Pre-release: keeping branch = main"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      - name: Create release
        uses: greenbone/actions/release@v3
        with:
          github-user: ${{ vars.RELEASE_USER || 'clawosiris' }}
          github-user-mail: ${{ vars.RELEASE_USER_MAIL || 'clawosiris@users.noreply.github.com' }}
          github-user-token: ${{ secrets.RELEASE_TOKEN }}
          release-type: ${{ inputs.release-type }}
          release-version: ${{ inputs.version }}
          versioning-scheme: semver
          project-types: cargo
          next-version: "false"
          admin-bypass: "false"
      - name: Regenerate Cargo.lock
        run: |
          cargo generate-lockfile
          if ! git diff --quiet Cargo.lock 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit --amend --no-edit
            git push --force-with-lease
            TAG="v${{ inputs.version }}"
            git tag -f "$TAG"
            git push origin "$TAG" --force
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  test:
    name: Test
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - run: cargo test --workspace --all-features

  sbom:
    name: Generate SBOM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: v${{ inputs.version }}
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate and upload SBOMs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo cyclonedx --format json --all --spec-version 1.5
          cargo cyclonedx --format xml --all --spec-version 1.5
          mkdir -p sbom-artifacts
          find . -name '*.cdx.json' -not -path '*/target/*' -not -path '*/sbom-artifacts/*' -exec cp {} sbom-artifacts/ \;
          find . -name '*.cdx.xml' -not -path '*/target/*' -not -path '*/sbom-artifacts/*' -exec cp {} sbom-artifacts/ \;
          python3 scripts/sbom_postprocess.py --cargo-toml Cargo.toml sbom-artifacts/*.cdx.json
          cd sbom-artifacts && tar czf ../gvm-rools-sbom.tar.gz *.cdx.* && cd ..
          sha256sum gvm-rools-sbom.tar.gz > gvm-rools-sbom.tar.gz.sha256
          gh release upload "v${{ inputs.version }}" gvm-rools-sbom.tar.gz gvm-rools-sbom.tar.gz.sha256 --clobber

  collect:
    name: Release complete
    needs: [sbom]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ All release artifacts published for v${{ inputs.version }}"
