name: Security

on:
  push:
    branches: [main]
    paths-ignore:
      - 'journal/**'
      - 'docs/**'
      - 'spec/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    # Keep the workflow running for docs-only PRs so branch protection always
    # receives the required `Security` status check.
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit
        run: cargo audit --ignore RUSTSEC-2026-0048 --ignore RUSTSEC-2026-0044 --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0074

  cargo-machete:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Configure git for private dependencies
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -n "${RELEASE_TOKEN}" ]; then
            git config --global url."https://x-access-token:${RELEASE_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: Run cargo-machete
        run: cargo machete

  # Semgrep SAST (static application security testing)
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/rust
            p/security-audit
            p/secrets
          generateSarif: "1"
      - name: Upload SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3
        with:
          sarif_file: semgrep.sarif

  security:
    name: Security
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - cargo-audit
      - cargo-machete
      - semgrep
    steps:
      - name: Require all security jobs to pass
        env:
          CARGO_AUDIT_RESULT: ${{ needs.cargo-audit.result }}
          CARGO_MACHETE_RESULT: ${{ needs.cargo-machete.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
        run: |
          test "$CARGO_AUDIT_RESULT" = success
          test "$CARGO_MACHETE_RESULT" = success
          test "$SEMGREP_RESULT" = success
